<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login To_do_App</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="Lista_de_Tarefas/css/estilo.css">
    <link rel="stylesheet" href="Lista_de_Tarefas/css/auth.css">
</head>
<body class="auth_page">
    <div class="auth_card">
        <div class="auth_header">
            <h1 class="auth_title">Entrar</h1>
            <p class="auth_subtitle">Faça login para acessar suas listas</p>
        </div>
        <form id="login_form" class="auth_form" novalidate>
            <div class="form_group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seuemail@email.com" autocomplete="email" required>
                <span class="field_error" id="email_error"></span>
            </div>
            <div class="form_group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="A tua senha" autocomplete="current-password" required>
                <span class="field_error" id="password_error"></span>
            </div>
            <div class="form_error" id="form_error" hidden></div>
            <button type="submit" class="btn btn-primary btn-full">Entrar</button>
        </form>
        <p class="auth_link">Ainda não tens uma conta? 
            <a href="registo.html">Regista-te aqui</a></p>
    </div>
    <script src="Lista_de_Tarefas/js/api.js"></script>
    <script src="Lista_de_Tarefas/js/auth.js"></script>  
</body>
</html>
