 <!DOCTYPE html>
 <html lang="pt">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas</title>
    <link rel="stylesheet" href="Lista_de_Tarefas/css/reset.css">
    <link rel="stylesheet" href="Lista_de_Tarefas/css/estilo.css">
 </head>
 <body>
     <!-- Botão de tema (canto superior direito) -->
    <button class="theme_toggle" onclick="toggle_theme()" title="Alternar tema">🌙</button>
    <section class="container">
        <h1>Lista de Tarefas</h1>
       <div class="task_input_container">
            <input type="text" id="task_input" placeholder="Digite a tarefa">
            <button onclick="add_task()">+</button>
        </div>
        <ul class="task_list" id="task_list">
        </ul>
        <div class="progress_container">
            <div class="progress_bar" id="progress_bar"></div>
        </div>
    </section>
        <script src="Lista_de_Tarefas/js/api.js"></script>
        <script src="Lista_de_Tarefas/js/script.js"></script>
 </body>
 </html>
